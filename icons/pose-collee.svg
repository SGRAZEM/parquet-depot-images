<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect x="5" y="5" width="90" height="90" rx="4" fill="none" stroke="#3D4A52" stroke-width="2.5"/>
  <!-- Sol -->
  <line x1="15" y1="75" x2="85" y2="75" stroke="#3D4A52" stroke-width="2"/>
  <!-- Colle (zigzag) -->
  <polyline points="25,72 30,68 35,72 40,68 45,72 50,68 55,72 60,68 65,72 70,68 75,72" fill="none" stroke="#B5622A" stroke-width="1.5"/>
  <!-- Lame collée -->
  <rect x="20" y="55" width="60" height="8" rx="1" fill="#3D4A52"/>
  <!-- Spatule -->
  <rect x="55" y="28" width="4" height="25" rx="1" fill="#3D4A52" transform="rotate(15 57 40)"/>
  <rect x="48" y="25" width="18" height="6" rx="1" fill="#3D4A52" transform="rotate(15 57 28)"/>
</svg>
